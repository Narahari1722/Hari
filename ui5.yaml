specVersion: "2.3"
metadata:
  name: materiallist
type: application
framework:
  name: SAPUI5
  version: "1.120.1"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          - path: /sap
            url: https://awssapnvl0001.aifalabs.net:44301
            client: "100"
            authenticationType: basic
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
